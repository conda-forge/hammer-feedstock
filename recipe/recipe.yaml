schema_version: 1

context:
  name: hammer
  version: "2.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://gitlab.com/mpapucci/Hammer/-/archive/v${{ version }}/Hammer-v${{ version }}.tar.gz
  sha256: 0fab1c9c2f1f9cc0b20250dc53d97ee49e723c2e927e9c913ecc1418f1d73019
  patches:
    - cxx20_aggregate_init.patch
    - pyext_no_build_isolation.patch
    - pic_all_architectures.patch
    - rpath_for_shared_libs.patch
    - demo01root_python_literals.patch
    - iobuffer_save_to_file_bytes.patch

build:
  number: 0
  skip:
    - win
    - ppc64le

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake
    - make
    - pkg-config
  host:
    - python
    - root_base
    - libboost-devel
    - hepmc3
    - yaml-cpp
    - numpy
    - matplotlib-base
    - cython
    - cymove
    - setuptools >=77.0.3
    - python-build
    - wheel
    - pip
  run:
    - python
    - matplotlib-base

tests:
  - python:
      imports:
        - hammer
      pip_check: false
  - package_contents:
      strict: true
      site_packages:
        - hammer
      include:
        - Hammer/Hammer.hh
        - Hammer/Process.hh
        - Hammer/Particle.hh
      files:
        # C++ libraries live under lib/Hammer/ (not $PREFIX/lib), so the lib: key
        # can't be used. They set SOVERSION, so each ships a versioned family
        # (libFoo.so/.so.2/.so.2.0.0 on Linux; libFoo.dylib/.2.0.0.dylib on macOS).
        # ".*" covers the whole family -- a bare SHLIB_EXT would miss the versioned
        # files (and ".so.N" on Linux is not even a suffix match).
        - lib/Hammer/libHammerBase.*
        - lib/Hammer/libHammerCore.*
        - lib/Hammer/libHammerMath.*
        - lib/Hammer/libHammerTensor.*
        - lib/Hammer/libHammerTools.*
        - lib/Hammer/libAmplitudes.*
        - lib/Hammer/libFormFactors.*
        - lib/Hammer/libRates.*
        - include/Hammer/**
        - include/flatbuffers/**
        - lib/cmake/Hammer/HammerConfig.cmake
        - lib/cmake/Hammer/**
        - lib/pkgconfig/Hammer.pc
        - lib/python*/site-packages/hammer/__init__.py
        - lib/python*/site-packages/hammer/libpyHammer.*
        - lib/python*/site-packages/hammer/**
        - lib/python*/site-packages/hammer-*.dist-info/**
        - share/Hammer/examples/demo01
        - share/Hammer/examples/**
  - script:
      - cd $CONDA_PREFIX/share/Hammer/examples
      # demo04mma/demo08mma omitted: they need Mathematica
      - ./demo01
      - ./demo01card
      - ./demo01root
      - ./demo02
      - ./demo02root
      - ./demo03
      - ./demo03root
      - ./demo04
      - ./demo04parallel
      - ./demo04root
      - ./demo04root2
      - ./demo05
      - ./demo07
      - ./demo08
      - ./demo09
      - ./demo10
      - ./demo11
      - ./demo12
      - ./demo13
      - ./demo13rl
      - ./demo14
      - python demo01.py
      - python demo01_io.py
      - python demo01root.py
      - python demo02.py
      - python demo03.py
      - python demo04.py

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: Helicity Amplitude Module for Matrix Element Reweighting
  description: |
    A C++ software library, designed to provide fast and efficient reweighting
    of large Monte Carlo datasets containing semileptonic b-Hadron decays to
    any desired New Physics, or to any description of the hadronic matrix
    elements. See the HAMMER website for more information.
  homepage: https://hammer.physics.lbl.gov/
  repository: https://gitlab.com/mpapucci/Hammer
  documentation: https://hammer.physics.lbl.gov/HammerManual.pdf

extra:
  recipe-maintainers:
    - chrisburr
